<!DOCTYPE html>
<html lang="">
<head>
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Build applications, integrate data and manage your Node-RED instances with enterprise-grade security.">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <script>
        // FOUC guard — paint theme before stylesheets load.
        (function () {
            try {
                var stored = localStorage.getItem('ff-theme-mode')
                if (stored !== 'light' && stored !== 'dark' && stored !== 'system') stored = 'system'
                var dark = stored === 'dark' || (stored === 'system' &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.dataset.theme = dark ? 'dark' : 'light'
            } catch (_) {
                document.documentElement.dataset.theme = 'light'
            }
        })()
    </script>
    <script>/*inject-ff-scripts*/</script>
</head>
<body>
    <noscript>
        <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
</body>
</html>
